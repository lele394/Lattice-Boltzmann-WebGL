<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lattice Boltzman WebGL</title>
</head>

<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
    }

    /* #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
    } */

    #sim-controls {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 20;
        background: rgba(20, 20, 24, 0.85);
        color: #f2f2f2;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        padding: 10px;
        min-width: 210px;
        backdrop-filter: blur(4px);
    }

    #sim-controls .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
    }

    #sim-controls .row:last-child {
        margin-bottom: 0;
    }

    #sim-controls button,
    #sim-controls input {
        font-size: 13px;
    }

    #sim-controls button {
        background: #2f3240;
        color: #f2f2f2;
        border: 1px solid #4a4f62;
        border-radius: 6px;
        padding: 6px 10px;
        cursor: pointer;
    }

    #sim-controls button:hover {
        background: #3a3e50;
    }

    #sim-controls input[type="number"] {
        width: 84px;
        background: #181a22;
        color: #f2f2f2;
        border: 1px solid #4a4f62;
        border-radius: 6px;
        padding: 4px 6px;
    }

    #sim-controls label {
        font-size: 13px;
        white-space: nowrap;
    }

    #sim-status {
        font-size: 12px;
        opacity: 0.85;
    }

</style>


<body>
    

    <canvas id="lbm-canvas" width="600" height="600"></canvas>

    <div id="sim-controls">
        <div class="row">
            <button id="play-pause-btn" type="button">Pause</button>
            <button id="step-btn" type="button">Step</button>
            <button id="reset-btn" type="button">Reset</button>
        </div>
        <div class="row">
            <label for="step-rate-input">Steps/s</label>
            <input id="step-rate-input" type="number" min="1" max="2000" step="1" value="60">
        </div>
        <div id="sim-status">Running</div>
    </div>

    <script src="scripts/main.js" type="module"></script>

</body>
</html>
